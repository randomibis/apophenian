{{ define "main" }}
<div class="col-xs-12 content-column white-background">
  <div class="row">
    <div class="col-lg-10 col-lg-offset-1">
      <div class="content-column-content">
         <h1>{{ .Title }}</h1>
         <div{{ if .Params.flex }} style="display: flex; flex-wrap: wrap; gap: 1em;"{{ end }}>
         {{ .Content }}
         </div>
      </div>
    </div>
  </div>
</div>
{{ end }}
